<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ímpar ou Par</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Ímpar ou Par</h1>
        <label><input type="radio" name="escolha" value="impar" checked> Ímpar</label>
        <label><input type="radio" name="escolha" value="par"> Par</label>
        <input type="number" id="numeroInput" min="1" max="10" placeholder="Digite um número de 1 a 10">
        <button id="jogarBtn">Jogar</button>
        <p id="resultado"></p>
        <ul id="resultadoList"></ul>
    </div>
</body>
</html>
